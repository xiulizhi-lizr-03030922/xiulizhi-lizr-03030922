<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for Eleven</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .player-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .cover {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 24px;
            background: #eee;
            display: block;
        }
        h2 {
            color: #2d3748;
            font-size: 24px;
            margin-bottom: 8px;
        }
        p {
            color: #718096;
            font-size: 16px;
            margin-bottom: 32px;
        }
        audio {
            width: 100%;
            height: 50px;
            border-radius: 25px;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="player-card">
        <!-- 你可以把下面的图片链接换成你的音频封面 -->
        <img src="https://picsum.photos/seed/mysong/200/200" alt="音频封面" class="cover">
        <h2>for Eleven</h2>
        <p>「for eleven」- Xiulizhi</p>
        <!-- 👇 请把这里的 "my_song.mp3" 改成你自己的音频文件名！！！ -->
        <audio controls>
            <source src="for_eleven.mp3" type="audio/mpeg">
        
    </div>
</body>
</html>
